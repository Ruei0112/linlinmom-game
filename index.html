<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林林媽的眼腦大挑戰 - 舒爾特方格</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-orange: #FF8A65;
            --primary-yellow: #FFD54F;
            --primary-blue: #4FC3F7;
            --primary-green: #81C784;
            --primary-purple: #BA68C8;
            --background-base: #FFFBF0;
            --text-dark: #5D4037;
            --danger-red: #FF5252;
        }

        body { font-family: 'M PLUS Rounded 1c', sans-serif; background-color: var(--background-base); display: flex; flex-direction: column; align-items: center; padding-top: 15px; margin: 0; color: var(--text-dark); touch-action: manipulation; }
        .marquee-container { width: 90%; max-width: 400px; background: #FFF9C4; border: 3px solid #FFD54F; border-radius: 20px; padding: 8px 15px; margin-bottom: 15px; overflow: hidden; position: relative; }
        .marquee-content { display: inline-block; white-space: nowrap; font-weight: 700; color: #E65100; padding-left: 100%; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }
        .header-container { text-align: center; margin-bottom: 10px; }
        .linlinma-logo { font-size: 35px; margin-bottom: 5px; }
        h1 { font-size: 1.8rem; color: var(--primary-orange); margin: 0; }
        
        .action-buttons { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-small { background-color: white; color: var(--primary-orange); border: 2px solid var(--primary-orange); padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-small:active { transform: scale(0.95); }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 30px; max-width: 320px; width: 100%; border: 5px solid var(--primary-yellow); box-shadow: 0 10px 25px rgba(0,0,0,0.2); box-sizing: border-box; }
        .modal-content h3 { color: var(--primary-orange); margin-top: 0; text-align: center; margin-bottom: 15px; }
        .close-modal { display: block; margin: 20px auto 0; background: var(--primary-orange); color: white; border: none; padding: 10px 30px; border-radius: 25px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .close-modal:active { transform: scale(0.95); }
        #rules-modal ul { padding-left: 20px; line-height: 1.6; margin-bottom: 0; }
        #rules-modal li { margin-bottom: 10px; font-weight: 700; color: #666; }
        
        .eval-section { margin-bottom: 15px; background: #FFFBF0; padding: 10px 15px; border-radius: 15px; border-left: 4px solid var(--primary-orange); }
        .eval-section h4 { margin: 0 0 5px 0; color: var(--primary-blue); font-size: 16px; }
        .eval-section p { margin: 0; font-size: 13px; font-weight: 700; color: #666; line-height: 1.5; }
        .eval-highlight { color: var(--primary-orange); }
        
        .name-input-area { margin-bottom: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        #player-name { padding: 10px 20px; border-radius: 25px; border: 3px solid var(--primary-blue); font-size: 16px; font-weight: 900; text-align: center; color: var(--primary-blue); width: 200px; outline: none; }
        
        .level-container { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
        .level-btn { padding: 8px 16px; border-radius: 30px; border: 3px solid #EEE; background: white; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .level-btn.active { color: white; transform: scale(1.05); }
        .level-btn.level-easy.active { background: var(--primary-green); border-color: var(--primary-green); }
        .level-btn.level-medium.active { background: var(--primary-blue); border-color: var(--primary-blue); }
        .level-btn.level-hard.active { background: var(--primary-purple); border-color: var(--primary-purple); }
        .level-btn.level-hell.active { background: var(--primary-orange); border-color: var(--primary-orange); }

        .order-container { display: flex; gap: 10px; margin-bottom: 15px; background: #FFF; padding: 5px; border-radius: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 2px solid #E1F5FE;}
        .order-btn { padding: 5px 20px; border-radius: 25px; border: none; background: transparent; color: #888; font-weight: 900; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .order-btn.active { background: var(--primary-blue); color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        #info { font-size: 28px; font-weight: 900; color: var(--primary-blue); margin-bottom: 15px; transition: color 0.3s; }
        #info.warning { color: var(--danger-red); animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        #grid-wrapper { background: white; padding: 15px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 5px solid #E1F5FE; margin-bottom: 20px; }
        #grid { display: grid; gap: 10px; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(3, 65px); }
        .cell { width: 65px; height: 65px; background: #FFF; border: 4px solid var(--primary-yellow); border-radius: 15px; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: 900; cursor: pointer; transition: 0.1s; }
        .cell.correct { background: var(--primary-green) !important; color: white !important; transform: scale(0.9); border-color: #66BB6A; }
        
        #start-btn { padding: 15px 40px; font-size: 22px; font-weight: 900; color: white; background: var(--primary-green); border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 5px solid #66BB6A; }
        
        /* 新增：免責聲明小字樣式 */
        .disclaimer-text {
            margin-top: 15px;
            margin-bottom: 25px;
            font-size: 12px;
            font-weight: 700;
            color: #BCAAA4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="rules-modal">
        <div class="modal-content">
            <h3>遊戲規則與玩法</h3>
            <ul>
                <li><strong>限時挑戰：</strong> 在倒數結束前依序點完所有數字！</li>
                <li><strong>視線集中：</strong> 眼睛盡量注視方格正中心，用餘光搜尋。</li>
                <li><strong>雙向挑戰：</strong> 可選擇「正序」由小到大，或「倒序」從大按回小，挑戰逆向思維！</li>
                <li><strong>最後警告：</strong> 剩下 10 秒時，計時器會變紅跳動喔！</li>
            </ul>
            <button class="close-modal" onclick="toggleRules(false)">我知道了！</button>
        </div>
    </div>

    <div class="modal-overlay" id="eval-modal">
        <div class="modal-content">
            <h3>🏆 大腦轉速評級表</h3>
            <div class="eval-section">
                <h4>初級 3x3</h4>
                <p>5秒內：<span class="eval-highlight">神級反應</span><br>10秒內：<span class="eval-highlight">眼明手快</span></p>
            </div>
            <div class="eval-section">
                <h4>中級 4x4</h4>
                <p>12秒內：<span class="eval-highlight">頂尖大腦</span><br>20秒內：<span class="eval-highlight">專注達人</span></p>
            </div>
            <div class="eval-section">
                <h4>高級 / 地獄 5x5</h4>
                <p>20秒內：<span class="eval-highlight">神級大腦</span><br>30秒內：<span class="eval-highlight">眼腦精英</span><br>40秒內：<span class="eval-highlight">專注達人</span></p>
            </div>
            <button class="close-modal" onclick="toggleEval(false)">設定好目標了！</button>
        </div>
    </div>

    <div class="header-container">
        <div class="linlinma-logo">⭐</div>
        <h1>林林媽的眼腦大挑戰</h1>
    </div>

    <div class="action-buttons">
        <button class="btn-small" onclick="toggleRules(true)">📖 規則說明</button>
        <button class="btn-small" onclick="toggleEval(true)">🏆 評級標準</button>
    </div>

    <div class="marquee-container">
        <div class="marquee-content" id="leaderboard-marquee">🏆 排行榜讀取中...</div>
    </div>

    <div class="name-input-area">
        <label style="font-size:14px; font-weight:700; color:#888;">挑戰者暱稱：</label>
        <input type="text" id="player-name" placeholder="輸入暱稱" maxlength="10">
    </div>

    <div class="level-container">
        <button class="level-btn level-easy active" onclick="setLevel('easy', this)">初級 3x3</button>
        <button class="level-btn level-medium" onclick="setLevel('medium', this)">中級 4x4</button>
        <button class="level-btn level-hard" onclick="setLevel('hard', this)">高級 5x5</button>
        <button class="level-btn level-hell" onclick="setLevel('hell', this)">地獄級</button>
    </div>

    <div class="order-container">
        <button class="order-btn active" onclick="setOrder('normal', this)" id="btn-normal">正序 (1 ➜ 9)</button>
        <button class="order-btn" onclick="setOrder('reverse', this)" id="btn-reverse">倒序 (9 ➜ 1)</button>
    </div>
    
    <div id="info">剩餘時間：<span id="timer">15.00</span> 秒</div>
    
    <div id="grid-wrapper"><div id="grid"></div></div>

    <button id="start-btn" onclick="startGame()">開始挑戰！</button>
    
    <div class="disclaimer-text">非專業評估 僅供娛樂測試</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbywKvXLB3tELoxhzyFmAbrI4pE2xhWdnkPE18FB7McvbM-YyXL-ALHeF2K2fm86DM5d/exec"; 
        const LIFF_ID = "2009821091-tQJWO27I";

        let lineUserId = "Guest";
        let startTime, timerInterval, nextNumber = 1, isRunning = false;
        let gridSize = 3, maxNumber = 9, isHellMode = false;
        let initialTime = 15;
        let allLeaderboards = null;
        let isReverseMode = false;

        function toggleRules(show) { document.getElementById('rules-modal').style.display = show ? 'flex' : 'none'; }
        function toggleEval(show) { document.getElementById('eval-modal').style.display = show ? 'flex' : 'none'; }

        async function init() {
            initGame();
            updateLeaderboard(); 
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    lineUserId = profile.userId;
                    document.getElementById('player-name').value = profile.displayName;
                } else { liff.login(); }
            } catch (err) { console.error("LIFF 初始化失敗", err); }
        }

        async function updateLeaderboard() {
            try {
                const response = await fetch(GAS_URL);
                allLeaderboards = await response.json();
                renderMarquee();
            } catch (e) { console.error("無法載入排行榜", e); }
        }

        function getFullLevelName() {
            let baseLevel = document.querySelector('.level-btn.active').textContent.split(' ')[0];
            return isReverseMode ? `${baseLevel}(倒序)` : baseLevel;
        }

        function renderMarquee() {
            if (!allLeaderboards) return;
            const marquee = document.getElementById('leaderboard-marquee');
            const fullLevelName = getFullLevelName();
            const levelData = allLeaderboards[fullLevelName] || [];
            
            if (levelData.length > 0) {
                marquee.innerHTML = levelData.map((r, i) => `【${fullLevelName} 第${i+1}名】${r.name}：${r.score}秒`).join(' &nbsp;&nbsp;🏆&nbsp;&nbsp; ');
            } else {
                marquee.innerHTML = `🏆 目前【${fullLevelName}】還沒有人挑戰，快來搶下第一名！`;
            }
        }

        function setOrder(mode, btn) {
            document.querySelectorAll('.order-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            isReverseMode = (mode === 'reverse');
            
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-btn').disabled = false;
            document.getElementById('info').classList.remove('warning');
            document.getElementById('timer').textContent = initialTime.toFixed(2);

            initGame();
            renderMarquee();
        }

        function setLevel(level, btn) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            isHellMode = (level === 'hell');
            
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-btn').disabled = false;
            document.getElementById('info').classList.remove('warning');
            
            if (level === 'easy') { gridSize = 3; maxNumber = 9; initialTime = 15; }
            else if (level === 'medium') { gridSize = 4; maxNumber = 16; initialTime = 25; }
            else if (level === 'hard') { gridSize = 5; maxNumber = 25; initialTime = 40; }
            else if (level === 'hell') { gridSize = 5; maxNumber = 25; initialTime = 30; isHellMode = true; }
            
            document.getElementById('btn-normal').textContent = `正序 (1 ➜ ${maxNumber})`;
            document.getElementById('btn-reverse').textContent = `倒序 (${maxNumber} ➜ 1)`;
            
            document.getElementById('timer').textContent = initialTime.toFixed(2);
            document.getElementById('grid').style.gridTemplateColumns = `repeat(${gridSize}, 65px)`;
            initGame();
            renderMarquee();
        }

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            let nums = Array.from({length: maxNumber}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            
            nextNumber = isReverseMode ? maxNumber : 1;
            
            nums.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = num;
                if (isHellMode) {
                    const hellColors = ['#E53935', '#1E88E5', '#43A047', '#FDD835', '#8E24AA', '#F4511E'];
                    const c = hellColors[Math.floor(Math.random() * hellColors.length)];
                    cell.style.color = c; cell.style.borderColor = c;
                }
                cell.onclick = () => {
                    if (!isRunning) return;
                    if (num === nextNumber) {
                        cell.classList.add('correct');
                        
                        if (isReverseMode) {
                            nextNumber--;
                            if (nextNumber < 1) endGame(true);
                        } else {
                            nextNumber++;
                            if (nextNumber > maxNumber) endGame(true);
                        }
                    }
                };
                grid.appendChild(cell);
            });
        }

        function startGame() {
            isRunning = true; initGame();
            startTime = Date.now();
            document.getElementById('start-btn').disabled = true;
            document.getElementById('info').classList.remove('warning');
            
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                const remaining = initialTime - elapsed;
                if (remaining <= 0) {
                    document.getElementById('timer').textContent = "0.00";
                    endGame(false);
                } else {
                    document.getElementById('timer').textContent = remaining.toFixed(2);
                    if (remaining <= 10) document.getElementById('info').classList.add('warning');
                }
            }, 10);
        }

        function getEvaluation(score, baseLevelName) {
            score = parseFloat(score);
            if (baseLevelName === "初級") {
                if (score < 5) return "【神級反應】你是未來的超級天才！";
                if (score < 10) return "【眼明手快】專注力像雷射光一樣準！";
                return "【繼續加油】試著注視中心，大腦會更靈光喔！";
            }
            if (baseLevelName === "中級") {
                if (score < 12) return "【頂尖大腦】這轉速太瘋狂了！";
                if (score < 20) return "【專注達人】表現非常優秀穩定！";
                return "【潛力玩家】再練幾次就能衝進精英區！";
            }
            if (score < 20) return "【神級大腦】天啊！具備飛行員等級的視覺廣度！";
            if (score < 30) return "【眼腦精英】專注力抓得死死的，太專業了！";
            if (score < 40) return "【專注達人】大腦引擎完全發動，效率極高！";
            return "【潛力玩家】成功挑戰！每天三次，練出最強大腦！";
        }

        async function endGame(isSuccess) {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('start-btn').disabled = false;
            if (isSuccess) {
                const timeUsed = (initialTime - parseFloat(document.getElementById('timer').textContent)).toFixed(2);
                const name = document.getElementById('player-name').value || "匿名玩家";
                
                const baseLevel = document.querySelector('.level-btn.active').textContent.split(' ')[0];
                const fullLevelName = getFullLevelName();
                const evaluation = getEvaluation(timeUsed, baseLevel);
                
                alert(`恭喜 ${name}！完成【${fullLevelName}】挑戰！\n用時：${timeUsed} 秒\n\n評級：${evaluation}`);
                
                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ userId: lineUserId, userName: name, level: fullLevelName, score: timeUsed })
                }).then(() => updateLeaderboard());
            } else {
                alert("太可惜了！時間到，挑戰失敗。\n別灰心，再試一次吧！");
            }
        }
        init();
    </script>
</body>
</html>
